<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>11 Jahre Werkstatt DJ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <div class="app-header">
      <div>
        <h1>11 Jahre Werkstatt DJ</h1>
      </div>
      <button id="settingsBtn" type="button" class="settings-btn" aria-label="Open settings">&#9881;</button>
    </div>

    <section class="player-card" aria-label="Player">
      <div class="now-playing">
        <div id="nowPlayingArt" class="now-playing-art now-playing-art-fallback" aria-hidden="true"></div>
        <div class="now-playing-text">
          <p id="nowPlayingTitle" class="now-playing-title">No track selected</p>
          <p id="nowPlayingMeta" class="now-playing-meta">Add a song to start your Track Queue.</p>
        </div>
        <div class="transport">
          <button id="playPauseBtn" type="button" class="icon-btn icon-btn-primary" title="Play" aria-label="Play" disabled>
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M8 5.2 19 12 8 18.8z" />
            </svg>
          </button>
          <button id="nextBtn" type="button" class="icon-btn" title="Skip track" aria-label="Skip track" disabled>
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M6 6.5v11l9-5.5zM18 6h2v12h-2z" />
            </svg>
          </button>
        </div>
      </div>

      <div class="player-progress-row">
        <span id="elapsedTime" class="player-time">0:00</span>
        <div class="progress-track" aria-hidden="true">
          <div id="progressFill" class="progress-fill"></div>
        </div>
        <span id="remainingTime" class="player-time">-0:00</span>
      </div>

    </section>

    <section class="search-panel" aria-label="Add songs">
      <div class="search-wrap">
        <input id="songInput" type="text" placeholder="Search songs (title or artist)" autocomplete="off" />
        <ul id="suggestions" class="suggestions hidden" aria-label="Song suggestions"></ul>
      </div>
      <button id="addBtn" type="button" class="add-btn" title="Add to Track Queue" aria-label="Add to Track Queue">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M11 4h2v7h7v2h-7v7h-2v-7H4v-2h7z" />
        </svg>
      </button>
    </section>

    <section class="playlist-panel" aria-label="Track Queue">
      <div class="queue-head">
        <h2>Track Queue</h2>
        <button id="clearBtn" type="button" class="clear-btn">Clear Track Queue</button>
      </div>
      <ol id="playlist" class="playlist"></ol>
    </section>

    <section class="history-panel" aria-label="History">
      <details>
        <summary>Previous Tracks (<span id="previousCount">0</span>)</summary>
        <ol id="previousHistoryList" class="history-list"></ol>
      </details>
    </section>

    <p id="status" class="status" aria-live="polite">Not connected.</p>

    <div id="errorToast" class="error-toast hidden" role="alert" aria-live="assertive">
      <p id="errorToastText" class="error-toast-text"></p>
      <div class="error-toast-actions">
        <button id="errorToastSettingsBtn" type="button" class="link-btn hidden">Open settings</button>
        <button id="errorToastDismissBtn" type="button" class="icon-btn" aria-label="Dismiss error">&times;</button>
      </div>
    </div>
  </main>

  <dialog id="settingsDialog" class="settings-dialog">
    <form method="dialog" class="settings-sheet">
      <div class="settings-header">
        <div>
          <h2>Settings</h2>
        </div>
        <button id="closeSettingsBtn" type="submit" class="settings-close" aria-label="Close settings">&times;</button>
      </div>

      <div class="settings-section">
        <button id="connectBtn" type="button" class="connect">Connect Spotify</button>
      </div>

      <div class="settings-section">
        <button id="exportHistoryBtn" type="button" class="connect">Export Track History JSON</button>
      </div>

      <div id="devicePanel" class="device-panel hidden settings-section">
        <label for="deviceSelect">Target device</label>
        <div class="device-row">
          <select id="deviceSelect" class="device-select"><option value="">-- select a device --</option></select>
          <button id="refreshDevicesBtn" type="button">Refresh</button>
        </div>
        <p class="connect-note">Set crossfade in Spotify app settings &rarr; Playback &rarr; Crossfade for native overlap between tracks.</p>
      </div>

      <div id="crossfadePanel" class="crossfade-panel settings-section">
        <label for="crossfadeInput">Crossfade overlap (seconds)</label>
        <input id="crossfadeInput" type="number" min="0" max="12" step="1" value="6" />
      </div>
    </form>
  </dialog>

  <script type="module" src="app.js"></script>
</body>
</html>
